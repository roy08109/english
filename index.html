<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>赌场运营英文对照学习器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            background: #1a1a2e;
            color: #fff;
        }
        body {
            padding: 16px 16px env(safe-area-inset-bottom) 16px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #ffd54f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tip {
            color: #888;
            font-size: 13px;
        }
        /* 控制栏 */
        .control-bar {
            background: #24243b;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row-label {
            color: #aaa;
            font-size: 13px;
            min-width: 56px;
        }
        .chip {
            padding: 7px 12px;
            border-radius: 16px;
            background: #2d2d44;
            color: #ccc;
            font-size: 13px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active {
            background: #0288d1;
            color: #fff;
            border-color: #4fc3f7;
        }
        .chip:active {
            opacity: 0.7;
        }
        /* 滑块 */
        input[type=range] {
            flex: 1;
            min-width: 100px;
            accent-color: #4fc3f7;
        }
        .val {
            color: #ffd54f;
            font-size: 13px;
            min-width: 38px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* 开关 */
        .switch {
            position: relative;
            width: 42px;
            height: 24px;
            background: #2d2d44;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .switch::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }
        .switch.on {
            background: #388e3c;
        }
        .switch.on::after {
            left: 20px;
        }
        /* 卡片 */
        .card {
            background: #24243b;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 16px;
            position: relative;
        }
        .star-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            font-size: 22px;
            color: #555;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-btn.on {
            color: #ffb300;
            text-shadow: 0 0 8px rgba(255,179,0,0.6);
        }
        .group-tag {
            display: inline-block;
            font-size: 11px;
            color: #4fc3f7;
            background: rgba(79,195,247,0.12);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .eng-text, .cn-text {
            line-height: 1.8;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .eng-text {
            font-size: 19px;
            color: #81d4fa;
        }
        .cn-text {
            font-size: 17px;
            color: #ffd54f;
        }
        .token {
            display: inline;
            padding: 0 2px;
            border-radius: 3px;
            transition: background 0.15s, color 0.15s;
        }
        .token.active {
            background: #ffb300;
            color: #1a1a2e;
            box-shadow: 0 0 6px rgba(255,179,0,0.5);
        }
        /* 进度条 */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: #2d2d44;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #0288d1);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 12px;
            color: #888;
            min-width: 70px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 100px;
            padding: 13px 8px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        .read-btn { background: #0288d1; }
        .prev-btn { background: #388e3c; }
        .next-btn { background: #f57c00; }
        .auto-btn { background: #6a1b9a; }
        .auto-btn.on { background: #ff5252; }
        .page-num {
            text-align: center;
            margin-top: 12px;
            color: #888;
            font-size: 12px;
        }
        .voice-tip {
            color: #ff8888;
            text-align: center;
            margin: 6px 0 14px;
            font-size: 13px;
            min-height: 18px;
        }
        .countdown {
            color: #ffd54f;
            font-weight: 600;
        }
        @media (min-width: 600px) {
            .eng-text { font-size: 21px; }
            .cn-text { font-size: 19px; }
            .title { font-size: 26px; }
        }
    </style>
</head>

// 加 id 與默認 favorite=false
const wordList = RAW.map((r, i) => ({ id: i, group: r[0], eng: r[1], cn: r[2], favorite: false }));

// ===================== 2. 持久化：localStorage =====================
const STORAGE_KEY = "floor-op-state-v1";
const State = {
    favorites: new Set(),
    currentId: wordList[0].id,
    rate: 0.7,
    autoPlay: false,
    autoInterval: 3,
    favFilter: false
};
function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            favorites: [...State.favorites],
            currentId: State.currentId,
            rate: State.rate,
            autoPlay: State.autoPlay,
            autoInterval: State.autoInterval,
            favFilter: State.favFilter
        }));
    } catch(e) { /* 忽略 quota */ }
}
function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (Array.isArray(s.favorites)) State.favorites = new Set(s.favorites);
        if (typeof s.currentId === "number") State.currentId = s.currentId;
        if (typeof s.rate === "number") State.rate = s.rate;
        if (typeof s.autoPlay === "boolean") State.autoPlay = s.autoPlay;
        if (typeof s.autoInterval === "number") State.autoInterval = s.autoInterval;
        if (typeof s.favFilter === "boolean") State.favFilter = s.favFilter;
        wordList.forEach(w => { if (State.favorites.has(w.id)) w.favorite = true; });
    } catch(e) { /* 默認值即可 */ }
}

// ===================== 3. 視圖列表（支援僅收藏） =====================
function viewList() {
    return State.favFilter ? wordList.filter(w => w.favorite) : wordList;
}
function viewIndex() {
    const list = viewList();
    const idx = list.findIndex(w => w.id === State.currentId);
    return { list, idx };
}

// ===================== 5. 渲染 =====================
function escapeHTML(s) {
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function tokenizeEn(text) {
    // 保留分隔符（空格、标点）以便 reassemble
    const parts = text.split(/(\s+|[,.;:!?()\[\]"'/&-])/);
    return parts.filter(p => p.length > 0);
}
function render() {
    const { list, idx } = viewIndex();
    if (list.length === 0) {
        engDom.textContent = "（没有收藏的句子）";
        cnDom.textContent = "请先添加收藏 ☆";
        pageInfoDom.textContent = "";
        starBtn.textContent = "☆"; starBtn.classList.remove("on");
        progressText.textContent = "0 / 0";
        progressFill.style.width = "0%";
        return;
    }
    const w = list[idx < 0 ? 0 : idx];
    if (idx < 0) State.currentId = w.id;
    // 英文：词组切分
    engDom.innerHTML = tokenizeEn(w.eng).map(t => {
        if (/^\s+$/.test(t) || /^[,.;:!?()\[\]"'/&\-]$/.test(t)) {
            return `<span>${escapeHTML(t)}</span>`;
        }
        return `<span class="token" data-tok>${escapeHTML(t)}</span>`;
    }).join("");
    cnDom.textContent = w.cn;
    pageInfoDom.textContent = `第 ${idx + 1} 句`;
    starBtn.textContent = w.favorite ? "★" : "☆";
    starBtn.classList.toggle("on", w.favorite);
    groupTag.textContent = GROUPS[w.group] || "";
    // 进度
    const total = list.length;
    progressText.textContent = `${idx + 1} / ${total}`;
    progressFill.style.width = `${((idx + 1) / total) * 100}%`;
    // 同步下拉
    jumpSelect.value = String(w.id);
    // 收藏计数
    favCount.textContent = `${State.favorites.size} 项`;
}

function rebuildSelect() {
    jumpSelect.innerHTML = "";
    const list = viewList();
    if (list.length === 0) {
        const opt = document.createElement("option");
        opt.textContent = "（无条目）"; opt.value = "-1";
        jumpSelect.appendChild(opt);
        return;
    }
    list.forEach((w, i) => {
        const opt = document.createElement("option");
        opt.value = String(w.id);
        const head = w.eng.length > 28 ? w.eng.slice(0, 28) + "…" : w.eng;
        opt.textContent = `${i + 1}. ${head}`;
        jumpSelect.appendChild(opt);
    });
}

// ===================== 6. 朗讀引擎（跟讀高亮） =====================
let currentUtter = null;
let autoPlayTimer = null;
let countdownTimer = null;

function cancelTimers() {
    if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

function clearHighlight(scope) {
    scope.querySelectorAll(".token.active").forEach(el => el.classList.remove("active"));
}

function speak(text, lang, opts = {}) {
    return new Promise((resolve) => {
        if (!("speechSynthesis" in window)) {
            voiceTip.textContent = "❌ 当前浏览器不支持语音朗读";
            resolve("unsupported");
            return;
        }
        speechSynthesis.cancel();
        cancelTimers();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = lang;
        utter.rate = State.rate;
        utter.pitch = 1;
        currentUtter = utter;
        // 跟读高亮（仅英文）
        if (lang.startsWith("en") && opts.highlight) {
            const tokens = [...engDom.querySelectorAll(".token")];
            const full = tokenizeEn(text);
            // 预计算每个 token 的 charIndex 起止
            const ranges = [];
            let pos = 0;
            full.forEach(t => {
                if (/^\s+$/.test(t) || /^[,.;:!?()\[\]"'/&\-]$/.test(t)) {
                    pos += t.length;
                } else {
                    ranges.push({ start: pos, end: pos + t.length });
                    pos += t.length;
                }
            });
            utter.onboundary = (e) => {
                if (e.name && e.name !== "word") return;
                const ci = e.charIndex;
                clearHighlight(engDom);
                for (let i = 0; i < ranges.length; i++) {
                    if (ci >= ranges[i].start && ci < ranges[i].end) {
                        const el = tokens[i];
                        if (el) {
                            el.classList.add("active");
                            // 自动滚动到可视区
                            const rect = el.getBoundingClientRect();
                            if (rect.top < 80 || rect.bottom > window.innerHeight - 80) {
                                el.scrollIntoView({ behavior: "smooth", block: "center" });
                            }
                        }
                        break;
                    }
                }
            };
        }
        utter.onend = () => {
            clearHighlight(engDom);
            currentUtter = null;
            resolve("end");
        };
        utter.onerror = (err) => {
            // iOS 某些情况下 cancel 后会触发 error，无需提示
            if (err.error === "canceled" || err.error === "interrupted") {
                resolve("cancel");
            } else {
                voiceTip.textContent = "❌ 朗读失败：" + (err.error || "");
                resolve("error");
            }
        };
        speechSynthesis.speak(utter);
    });
}

async function playCurrent() {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    const w = list[idx < 0 ? 0 : idx];
    voiceTip.textContent = "🔊 朗读中…";
    const res = await speak(w.eng, "en-US", { highlight: true });
    if (res === "end") {
        voiceTip.textContent = State.autoPlay ? "" : "✅ 朗读完成";
        if (State.autoPlay) scheduleNext();
    } else if (res === "cancel") {
        voiceTip.textContent = "";
    }
}

function scheduleNext() {
    cancelTimers();
    let remaining = State.autoInterval;
    voiceTip.innerHTML = `⏭ <span class="countdown" id="cd">${remaining}</span> 秒后下一句…`;
    countdownTimer = setInterval(() => {
        remaining--;
        const el = document.getElementById("cd");
        if (el) el.textContent = remaining;
        if (remaining <= 0) {
            cancelTimers();
            goNext(true);
        }
    }, 1000);
    autoPlayTimer = setTimeout(() => {
        cancelTimers();
        goNext(true);
    }, State.autoInterval * 1000);
}

function stopAll() {
    speechSynthesis.cancel();
    cancelTimers();
    currentUtter = null;
    clearHighlight(engDom);
    voiceTip.textContent = "";
}

function goNext(auto = false) {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    if (idx < list.length - 1) {
        State.currentId = list[idx + 1].id;
    } else {
        // 末尾回到首句
        State.currentId = list[0].id;
        if (auto) voiceTip.textContent = "🔁 已循环到首句";
    }
    saveState();
    render();
    if (auto && State.autoPlay) playCurrent();
}
function goPrev() {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    if (idx > 0) State.currentId = list[idx - 1].id;
    else State.currentId = list[list.length - 1].id;
    saveState();
    render();
}

// ===================== 7. 事件綁定 =====================
readBtn.addEventListener("click", () => {
    if (State.autoPlay && currentUtter) {
        // 自动播放中点朗读 = 停止
        State.autoPlay = false;
        updateAutoUI();
        stopAll();
        saveState();
    } else {
        playCurrent();
    }
});
prevBtn.addEventListener("click", () => { stopAll(); goPrev(); });
nextBtn.addEventListener("click", () => { stopAll(); goNext(false); });

jumpSelect.addEventListener("change", (e) => {
    const id = parseInt(e.target.value);
    if (!isNaN(id) && id >= 0) {
        State.currentId = id;
        stopAll();
        saveState();
        render();
    }
});

// 语速
rateRange.addEventListener("input", () => {
    State.rate = parseFloat(rateRange.value);
    rateVal.textContent = State.rate.toFixed(2) + "x";
    saveState();
});

// 自动播放开关
function updateAutoUI() {
    autoSwitch.classList.toggle("on", State.autoPlay);
    autoLabel.textContent = State.autoPlay ? "开启" : "关闭";
    readBtn.textContent = State.autoPlay && currentUtter ? "⏹ 停止" : "🔊 朗读";
}
autoSwitch.addEventListener("click", () => {
    State.autoPlay = !State.autoPlay;
    updateAutoUI();
    saveState();
    if (State.autoPlay) {
        playCurrent();
    } else {
        stopAll();
    }
});
intervalRange.addEventListener("input", () => {
    State.autoInterval = parseInt(intervalRange.value);
    intervalVal.textContent = State.autoInterval + "s";
    saveState();
});

// 收藏筛选
favFilterChip.addEventListener("click", () => {
    State.favFilter = !State.favFilter;
    favFilterChip.classList.toggle("active", State.favFilter);
    rebuildSelect();
    render();
    saveState();
});

// 收藏星标
starBtn.addEventListener("click", () => {
    const w = wordList.find(x => x.id === State.currentId);
    if (!w) return;
    w.favorite = !w.favorite;
    if (w.favorite) State.favorites.add(w.id);
    else State.favorites.delete(w.id);
    saveState();
    render();
});

// 进度条点击跳转
progressBar.addEventListener("click", (e) => {
    const rect = progressBar.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const list = viewList();
    if (list.length === 0) return;
    const target = Math.floor(ratio * list.length);
    State.currentId = list[Math.min(target, list.length - 1)].id;
    stopAll();
    saveState();
    render();
});

// 键盘快捷键
document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
    if (e.key === "ArrowLeft") { stopAll(); goPrev(); }
    else if (e.key === "ArrowRight") { stopAll(); goNext(false); }
    else if (e.key === " " || e.key === "Enter") { e.preventDefault(); readBtn.click(); }
});

// 触摸滑动（左右滑切句）
let touchStartX = 0, touchStartY = 0;
document.addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", (e) => {
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) { stopAll(); goNext(false); }
        else { stopAll(); goPrev(); }
    }
}, { passive: true });

// ===================== 8. iOS / 後台兼容 =====================
// 首次进入尝试解锁 voices
function unlockVoices() {
    if (!("speechSynthesis" in window)) return;
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.lang = "en-US";
    speechSynthesis.speak(u);
}
// 页面切回前台时，iOS 可能已暂停合成
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        speechSynthesis.cancel();
    } else {
        unlockVoices();
    }
});

// ===================== 9. 初始化 =====================
loadState();
rebuildSelect();
// 应用持久化设置
rateRange.value = State.rate;
rateVal.textContent = State.rate.toFixed(2) + "x";
intervalRange.value = State.autoInterval;
intervalVal.textContent = State.autoInterval + "s";
favFilterChip.classList.toggle("active", State.favFilter);
updateAutoUI();
render();
unlockVoices();

// Service Worker
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
}
</script>
