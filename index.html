let currentIndex = 0;
const engDom = document.getElementById("engContent");
const cnDom = document.getElementById("cnContent");
const pageInfoDom = document.getElementById("pageInfo");
const jumpSelect = document.getElementById("jumpSelect");
const readBtn = document.getElementById("readBtn");
const prevBtn = document.getElementById("prevBtn");
const nextBtn = document.getElementById("nextBtn");
const voiceTip = document.getElementById("voiceTip");

// 初始化下拉框
function initSelect() {
    jumpSelect.innerHTML = "";
    wordList.forEach((item, idx) => {
        const opt = document.createElement("option");
        opt.value = idx;
        opt.textContent = `第${idx+1}句：${item.eng.slice(0,30)}...`;
        jumpSelect.appendChild(opt);
    });
}

// 渲染当前内容
function render() {
    const item = wordList[currentIndex];
    engDom.textContent = item.eng;
    cnDom.textContent = item.cn;
    pageInfoDom.textContent = `当前：${currentIndex + 1} / 总 ${wordList.length} 句`;
    jumpSelect.value = currentIndex;
}

// 修复朗读函数：等待语音加载、清除旧朗读、捕获错误
function speakEng() {
    voiceTip.textContent = "";
    // 停止正在朗读的语音
    speechSynthesis.cancel();
    const text = wordList[currentIndex].eng;
    // 判断浏览器是否支持语音
    if (!window.speechSynthesis) {
        voiceTip.textContent = "❌ 当前浏览器不支持语音朗读，请更换Chrome/Edge";
        return;
    }
    // 等待语音包加载完成
    function doSpeak() {
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = "en-US";
        utter.rate = 0.7; // 语速放慢，听得更清楚
        utter.pitch = 1;
        // 朗读完成提示
        utter.onend = () => {
            voiceTip.textContent = "✅ 朗读完成";
        };
        // 朗读失败捕获
        utter.onerror = (err) => {
            voiceTip.textContent = "❌ 朗读失败：" + err.error + "，请打开系统语音权限";
        };
        speechSynthesis.speak(utter);
    }
    // 加载语音列表
    let voices = speechSynthesis.getVoices();
    if (voices.length === 0) {
        speechSynthesis.onvoiceschanged = () => {
            voices = speechSynthesis.getVoices();
            doSpeak();
        }
    } else {
        doSpeak();
    }
}

// 上一句
function prev() {
    if(currentIndex > 0) {
        currentIndex--;
        render();
        speechSynthesis.cancel();
        voiceTip.textContent = "";
    }
}

// 下一句
function next() {
    if(currentIndex < wordList.length -1) {
        currentIndex++;
        render();
        speechSynthesis.cancel();
        voiceTip.textContent = "";
    }
}

// 跳转选择
jumpSelect.addEventListener("change", (e)=>{
    currentIndex = parseInt(e.target.value);
    render();
    speechSynthesis.cancel();
    voiceTip.textContent = "";
});

// 按钮绑定
readBtn.addEventListener("click", speakEng);
prevBtn.addEventListener("click", prev);
nextBtn.addEventListener("click", next);

// 页面初始化
initSelect();
render();

// 注册 Service Worker（PWA 离线 + 主屏幕体验）
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
            console.warn('SW 注册失败：', err);
        });
    });
}
