<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="icon" type="image/png" sizes="192x192" href="english-192.png">
    <link rel="apple-touch-icon" type="image/png" sizes="512x512" href="english-512.png">
    <link rel="icon" type="image/png" sizes="512x512" href="english-512.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Floor Op">
    <title>赌场运营英文对照学习器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            background: #1a1a2e;
            color: #fff;
        }
        body {
            padding: 16px 16px env(safe-area-inset-bottom) 16px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #ffd54f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tip {
            color: #888;
            font-size: 13px;
        }
        /* Tab 切換 */
        .tab-bar {
            display: flex;
            gap: 0;
            background: #24243b;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .tab-bar .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
        }
        .tab-bar .tab.active {
            background: #0288d1;
            color: #fff;
            font-weight: 600;
        }
        /* 控制栏 */
        .control-bar {
            background: #24243b;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row-label {
            color: #aaa;
            font-size: 13px;
            min-width: 56px;
        }
        .chip {
            padding: 7px 12px;
            border-radius: 16px;
            background: #2d2d44;
            color: #ccc;
            font-size: 13px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active {
            background: #0288d1;
            color: #fff;
            border-color: #4fc3f7;
        }
        .chip:active {
            opacity: 0.7;
        }
        /* 滑块 */
        input[type=range] {
            flex: 1;
            min-width: 100px;
            accent-color: #4fc3f7;
        }
        .val {
            color: #ffd54f;
            font-size: 13px;
            min-width: 38px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* 开关 */
        .switch {
            position: relative;
            width: 42px;
            height: 24px;
            background: #2d2d44;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .switch::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }
        .switch.on {
            background: #388e3c;
        }
        .switch.on::after {
            left: 20px;
        }
        /* 卡片 */
        .card {
            background: #24243b;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 16px;
            position: relative;
        }
        .star-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            font-size: 22px;
            color: #555;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-btn.on {
            color: #ffb300;
            text-shadow: 0 0 8px rgba(255,179,0,0.6);
        }
        .group-tag {
            display: inline-block;
            font-size: 11px;
            color: #4fc3f7;
            background: rgba(79,195,247,0.12);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .eng-text, .cn-text {
            line-height: 1.8;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .eng-text {
            font-size: 19px;
            color: #81d4fa;
        }
        .cn-text {
            font-size: 17px;
            color: #ffd54f;
        }
        .token {
            display: inline;
            padding: 0 2px;
            border-radius: 3px;
            transition: background 0.15s, color 0.15s;
        }
        .token.active {
            background: #ffb300;
            color: #1a1a2e;
            box-shadow: 0 0 6px rgba(255,179,0,0.5);
        }
        /* 进度条 */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: #2d2d44;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #0288d1);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 12px;
            color: #888;
            min-width: 70px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 100px;
            padding: 13px 8px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        .read-btn { background: #0288d1; }
        .prev-btn { background: #388e3c; }
        .next-btn { background: #f57c00; }
        .auto-btn { background: #6a1b9a; }
        .auto-btn.on { background: #ff5252; }
        .page-num {
            text-align: center;
            margin-top: 12px;
            color: #888;
            font-size: 12px;
        }
        .voice-tip {
            color: #ff8888;
            text-align: center;
            margin: 6px 0 14px;
            font-size: 13px;
            min-height: 18px;
        }
        .countdown {
            color: #ffd54f;
            font-weight: 600;
        }
        /* 人員組織圖 */
        .people-section { display: none; }
        .people-section.active { display: block; }
        .phone-section { display: none; }
        .phone-section.active { display: block; }
        .vocab-section { display: block; }
        .vocab-section.hidden { display: none; }

        .org-team {
            background: #24243b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .org-team-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffd54f;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a5c;
        }
        .org-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .org-row.indent-1 { padding-left: 20px; }
        .org-row.indent-2 { padding-left: 40px; }
        .org-card {
            background: #1e1e32;
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1 1 auto;
            border-left: 3px solid #4fc3f7;
        }
        .org-card.level-svp { border-left-color: #ff5252; }
        .org-card.level-vp  { border-left-color: #ffb300; }
        .org-card.level-avp { border-left-color: #ffb300; }
        .org-card.level-dir { border-left-color: #4fc3f7; }
        .org-card.level-ad  { border-left-color: #81c784; }
        .org-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #3a3a5c;
        }
        .org-info { min-width: 0; }
        .org-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .org-title {
            font-size: 12px;
            color: #4fc3f7;
        }
        .org-title-cn {
            font-size: 11px;
            color: #aaa;
        }
        .org-speak {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            color: #4fc3f7;
            transition: 0.15s;
            flex-shrink: 0;
            margin-left: auto;
            min-width: auto;
            flex: none;
            line-height: 1;
        }
        .org-speak:active {
            background: rgba(79,195,247,0.2);
            transform: scale(0.9);
        }
        /* 電話本 */
        .phone-card {
            background: #24243b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            border-left: 3px solid #4fc3f7;
        }
        .phone-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #ffd54f;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a5c;
        }
        .phone-card-title .en {
            color: #81d4fa;
            font-weight: 600;
        }
        .phone-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 14px;
            padding: 8px 10px;
            background: #1e1e32;
            border-radius: 8px;
        }
        .phone-row:last-child { margin-bottom: 0; }
        .phone-row-desc {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .phone-row-desc .zh {
            color: #ddd;
        }
        .phone-row-desc .sep {
            color: #4fc3f7;
            margin: 0 4px;
        }
        .phone-row-desc .en {
            color: #81d4fa;
        }
        .phone-row-num {
            font-size: 15px;
            font-weight: 600;
            color: #ffb300;
            padding-left: 0;
            font-variant-numeric: tabular-nums;
        }
        .phone-row-num::before {
            content: "📞 ";
            font-weight: 400;
        }
        .phone-empty {
            text-align: center;
            color: #888;
            font-size: 14px;
            padding: 40px 0;
        }
        .phone-search {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border-radius: 10px;
            border: none;
            background: #2d2d44;
            color: #fff;
            outline: none;
            margin-bottom: 16px;
        }
        .phone-search::placeholder { color: #666; }
        .phone-search:focus {
            background: #33335c;
            box-shadow: 0 0 0 2px #4fc3f7;
        }
        /* 測試模式 */
        .quiz-section { display: none; }
        .quiz-section.active { display: block; }
        .quiz-card {
            background: #24243b;
            border-radius: 12px;
            padding: 22px;
            text-align: center;
        }
        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .quiz-label {
            font-size: 14px;
            color: #4fc3f7;
            font-weight: 600;
        }
        .quiz-score {
            font-size: 14px;
            color: #ffd54f;
        }
        .quiz-progress {
            font-size: 13px;
            color: #888;
            margin-bottom: 18px;
        }
        .quiz-eng-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e1e32;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 24px;
        }
        .quiz-eng {
            flex: 1;
            font-size: 20px;
            color: #81d4fa;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .quiz-speak {
            flex-shrink: 0;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid #4fc3f7;
            background: transparent;
            color: #4fc3f7;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: auto;
            flex: none;
        }
        .quiz-speak:active {
            background: rgba(79,195,247,0.2);
            transform: scale(0.9);
        }
        .quiz-filter {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 16px;
        }
        .quiz-filter .chip {
            padding: 6px 14px;
            border-radius: 16px;
            background: #2d2d44;
            color: #ccc;
            font-size: 13px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .quiz-filter .chip.active {
            background: #0288d1;
            color: #fff;
            border-color: #4fc3f7;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }
        .quiz-opt {
            padding: 14px 16px;
            border-radius: 10px;
            background: #1e1e32;
            color: #ddd;
            font-size: 16px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            text-align: left;
            line-height: 1.5;
        }
        .quiz-opt:active { opacity: 0.7; }
        .quiz-opt.correct {
            background: #1b5e20;
            border-color: #4caf50;
            color: #fff;
        }
        .quiz-opt.wrong {
            background: #5f1b1b;
            border-color: #f44336;
            color: #fff;
        }
        .quiz-opt.disabled { pointer-events: none; }
        .quiz-feedback {
            font-size: 15px;
            min-height: 24px;
            margin-bottom: 14px;
            color: #ffd54f;
        }
        .quiz-next {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: #0288d1;
            color: #fff;
            transition: 0.2s;
        }
        .quiz-next:active { transform: scale(0.97); opacity: 0.85; }
        .quiz-next.hidden { display: none; }
        /* 分析面板 */
        .quiz-analysis-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .quiz-analysis-overlay.show { display: flex; }
        .quiz-analysis-panel {
            background: #24243b;
            border-radius: 14px;
            width: 100%;
            max-width: 420px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px 20px 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        }
        .quiz-analysis-panel h3 {
            font-size: 18px;
            margin-bottom: 16px;
            text-align: center;
            color: #ffd54f;
        }
        .quiz-analysis-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            margin-bottom: 6px;
            background: #2d2d44;
            border-radius: 8px;
        }
        .quiz-analysis-item .qai-eng {
            font-weight: 600;
            font-size: 15px;
        }
        .quiz-analysis-item .qai-zh {
            font-size: 13px;
            color: #aaa;
            margin-left: 8px;
        }
        .quiz-analysis-item .qai-count {
            background: #f44336;
            color: #fff;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }
        .quiz-analysis-empty {
            text-align: center;
            color: #888;
            font-size: 14px;
            padding: 20px 0;
        }
        .quiz-analysis-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }
        .quiz-analysis-actions button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
        }
        .quiz-analysis-actions button:active { transform: scale(0.97); opacity: 0.85; }
        .qaa-reset {
            background: #0288d1;
            color: #fff;
        }
        .qaa-close {
            background: #3a3a55;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="title">Floor Operation 中英文对照学习</h1>
        <p class="tip">点星收藏 · 滑动调速 · 自动循环 · 跟读高亮 · 测试答题</p>
    </div>

    <div class="tab-bar">
        <div class="tab active" data-tab="vocab">📖 單詞</div>
        <div class="tab" data-tab="people">👥 人員</div>
        <div class="tab" data-tab="phone">📞 電話</div>
        <div class="tab" data-tab="quiz">✍️ 測試</div>
    </div>

    <div class="vocab-section" id="vocabSection">
    <div class="control-bar">
        <div class="row">
            <span class="row-label">语速</span>
            <input type="range" id="rateRange" min="0.5" max="1.5" step="0.05" value="0.7">
            <span class="val" id="rateVal">0.70x</span>
        </div>
        <div class="row">
            <span class="row-label">自动</span>
            <div class="switch" id="autoSwitch"></div>
            <span class="val" id="autoLabel">关闭</span>
            <span class="row-label" style="min-width:auto;">间隔</span>
            <input type="range" id="intervalRange" min="1" max="10" step="1" value="3">
            <span class="val" id="intervalVal">3s</span>
        </div>
        <div class="row">
            <span class="row-label">收藏</span>
            <span class="chip" id="favFilterChip">仅看收藏</span>
            <span class="val" id="favCount">0 项</span>
        </div>
    </div>

    <div class="voice-tip" id="voiceTip"></div>

    <div class="card">
        <button class="star-btn" id="starBtn" title="收藏">☆</button>
        <span class="group-tag" id="groupTag"></span>
        <div class="eng-text" id="engContent"></div>
        <div class="cn-text" id="cnContent"></div>
        <div class="btn-group">
            <button class="read-btn" id="readBtn">🔊 朗读</button>
            <button class="prev-btn" id="prevBtn">⬅ 上一句</button>
            <button class="next-btn" id="nextBtn">下一句 ➡</button>
        </div>
        <div class="page-num" id="pageInfo"></div>
    </div>

    <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressText">0 / 0</span>
    </div>

    <select id="jumpSelect" class="select-box" style="width:100%;padding:12px;font-size:15px;border-radius:8px;border:none;background:#2d2d44;color:#fff;"></select>
    </div>

    <div class="people-section" id="peopleSection">
        <div id="orgContainer"></div>
    </div>

    <div class="phone-section" id="phoneSection">
        <input class="phone-search" id="phoneSearch" type="text" placeholder="🔍 搜索部门、号码或关键词…" autocomplete="off">
        <div id="phoneContainer"></div>
    </div>

    <div class="quiz-section" id="quizSection">
        <div class="quiz-card">
            <div class="quiz-header">
                <span class="quiz-label">✍️ 測試模式</span>
                <span class="quiz-score" id="quizScore">✅ 0  &nbsp;❌ 0</span>
            </div>
            <div class="quiz-progress"><span id="quizProgress">0 / 0</span></div>
            <div class="quiz-filter">
                <span class="chip active" data-qcat="all">全部</span>
                <span class="chip" data-qcat="month">月份</span>
                <span class="chip" data-qcat="weekday">星期几</span>
            </div>
            <div class="quiz-eng-wrap">
                <div class="quiz-eng" id="quizEng"></div>
                <button class="quiz-speak" id="quizSpeakBtn" title="朗读英文">🔊</button>
            </div>
            <div class="quiz-options" id="quizOptions"></div>
            <div class="quiz-feedback" id="quizFeedback"></div>
            <button class="quiz-next" id="quizNextBtn">下一題 ➡</button>
        </div>
        <!-- 分析面板 -->
        <div class="quiz-analysis-overlay" id="quizAnalysisOverlay">
            <div class="quiz-analysis-panel">
                <h3>📊 弱點分析</h3>
                <div id="quizAnalysisBody"></div>
                <div class="quiz-analysis-actions">
                    <button class="qaa-reset" id="qaaReset">重新開始</button>
                    <button class="qaa-close" id="qaaClose">關閉</button>
                </div>
            </div>
        </div>
    </div>

    <script>
// ===================== 1. 數據：詞條帶分組與 id =====================
const GROUPS = {
    gaming: "Gaming Floor",
    fb:     "F&B Outlets",
    hot:    "Hotlines",
    comp:   "Comp Transaction",
    org:    "組織架構",
    patron: "Patron Management"
};
// 預設全部為未收藏

// ===================== 5. 渲染 =====================
function escapeHTML(s) {
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function tokenizeEn(text) {
    // 保留分隔符（空格、标点）以便 reassemble
    const parts = text.split(/(\s+|[,.;:!?()\[\]"'/&-])/);
    return parts.filter(p => p.length > 0);
}
function render() {
    const { list, idx } = viewIndex();
    if (list.length === 0) {
        engDom.textContent = "（没有收藏的句子）";
        cnDom.textContent = "请先添加收藏 ☆";
        pageInfoDom.textContent = "";
        starBtn.textContent = "☆"; starBtn.classList.remove("on");
        progressText.textContent = "0 / 0";
        progressFill.style.width = "0%";
        return;
    }
    const w = list[idx < 0 ? 0 : idx];
    if (idx < 0) State.currentId = w.id;
    // 英文：词组切分
    engDom.innerHTML = tokenizeEn(w.eng).map(t => {
        if (/^\s+$/.test(t) || /^[,.;:!?()\[\]"'/&\-]$/.test(t)) {
            return `<span>${escapeHTML(t)}</span>`;
        }
        return `<span class="token" data-tok>${escapeHTML(t)}</span>`;
    }).join("");
    cnDom.textContent = w.cn;
    pageInfoDom.textContent = `第 ${idx + 1} 句`;
    starBtn.textContent = w.favorite ? "★" : "☆";
    starBtn.classList.toggle("on", w.favorite);
    groupTag.textContent = GROUPS[w.group] || "";
    // 进度
    const total = list.length;
    progressText.textContent = `${idx + 1} / ${total}`;
    progressFill.style.width = `${((idx + 1) / total) * 100}%`;
    // 同步下拉
    jumpSelect.value = String(w.id);
    // 收藏计数
    favCount.textContent = `${State.favorites.size} 项`;
}

function rebuildSelect() {

    });
}

// ===================== 6. 朗讀引擎（跟讀高亮） =====================
let currentUtter = null;
let autoPlayTimer = null;
let countdownTimer = null;

function cancelTimers() {
    if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

function clearHighlight(scope) {
    scope.querySelectorAll(".token.active").forEach(el => el.classList.remove("active"));
}

function speak(text, lang, opts = {}) {
    return new Promise((resolve) => {
        if (!("speechSynthesis" in window)) {
            voiceTip.textContent = "❌ 当前浏览器不支持语音朗读";
            resolve("unsupported");
            return;
        }
        speechSynthesis.cancel();
        cancelTimers();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = lang;
        utter.rate = State.rate;
        utter.pitch = 1;
        currentUtter = utter;
        // 跟读高亮（仅英文）
        if (lang.startsWith("en") && opts.highlight) {
            const tokens = [...engDom.querySelectorAll(".token")];
            const full = tokenizeEn(text);
            // 预计算每个 token 的 charIndex 起止
            const ranges = [];
            let pos = 0;
            full.forEach(t => {
                if (/^\s+$/.test(t) || /^[,.;:!?()\[\]"'/&\-]$/.test(t)) {
                    pos += t.length;
                } else {
                    ranges.push({ start: pos, end: pos + t.length });
                    pos += t.length;
                }
            });
            utter.onboundary = (e) => {
                if (e.name && e.name !== "word") return;
                const ci = e.charIndex;
                clearHighlight(engDom);
                for (let i = 0; i < ranges.length; i++) {
                    if (ci >= ranges[i].start && ci < ranges[i].end) {
                        const el = tokens[i];
                        if (el) {
                            el.classList.add("active");
                            // 自动滚动到可视区
                            const rect = el.getBoundingClientRect();
                            if (rect.top < 80 || rect.bottom > window.innerHeight - 80) {
                                el.scrollIntoView({ behavior: "smooth", block: "center" });
                            }
                        }
                        break;
                    }
                }
            };
        }
        utter.onend = () => {
            clearHighlight(engDom);
            currentUtter = null;
            resolve("end");
        };
        utter.onerror = (err) => {
            // iOS 某些情况下 cancel 后会触发 error，无需提示
            if (err.error === "canceled" || err.error === "interrupted") {
                resolve("cancel");
            } else {
                voiceTip.textContent = "❌ 朗读失败：" + (err.error || "");
                resolve("error");
            }
        };
        speechSynthesis.speak(utter);
    });
}

async function playCurrent() {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    const w = list[idx < 0 ? 0 : idx];
    voiceTip.textContent = "🔊 朗读中…";
    const res = await speak(w.eng, "en-US", { highlight: true });
    if (res === "end") {
        voiceTip.textContent = State.autoPlay ? "" : "✅ 朗读完成";
        if (State.autoPlay) scheduleNext();
    } else if (res === "cancel") {
        voiceTip.textContent = "";
    }
}

function scheduleNext() {
    cancelTimers();
    let remaining = State.autoInterval;
    voiceTip.innerHTML = `⏭ <span class="countdown" id="cd">${remaining}</span> 秒后下一句…`;
    countdownTimer = setInterval(() => {
        remaining--;
        const el = document.getElementById("cd");
        if (el) el.textContent = remaining;
        if (remaining <= 0) {
            cancelTimers();
            goNext(true);
        }
    }, 1000);
    autoPlayTimer = setTimeout(() => {
        cancelTimers();
        goNext(true);
    }, State.autoInterval * 1000);
}

function stopAll() {
    speechSynthesis.cancel();
    cancelTimers();
    currentUtter = null;
    clearHighlight(engDom);
    voiceTip.textContent = "";
}

function goNext(auto = false) {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    if (idx < list.length - 1) {
        State.currentId = list[idx + 1].id;
    } else {
        // 末尾回到首句
        State.currentId = list[0].id;
        if (auto) voiceTip.textContent = "🔁 已循环到首句";
    }
    saveState();
    render();
    if (auto && State.autoPlay) playCurrent();
}
function goPrev() {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    if (idx > 0) State.currentId = list[idx - 1].id;
    else State.currentId = list[list.length - 1].id;
    saveState();
    render();
}

// 进度条点击跳转
progressBar.addEventListener("click", (e) => {
    const rect = progressBar.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const list = viewList();
    if (list.length === 0) return;
    const target = Math.floor(ratio * list.length);
    State.currentId = list[Math.min(target, list.length - 1)].id;
    stopAll();
    saveState();
    render();
});

// 键盘快捷键
document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
    if (e.key === "ArrowLeft") { stopAll(); goPrev(); }
    else if (e.key === "ArrowRight") { stopAll(); goNext(false); }
    else if (e.key === " " || e.key === "Enter") { e.preventDefault(); readBtn.click(); }
});

// 触摸滑动（左右滑切句）
let touchStartX = 0, touchStartY = 0;
document.addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", (e) => {
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) { stopAll(); goNext(false); }
        else { stopAll(); goPrev(); }
    }
}, { passive: true });

function parsePhoneRow(eng, zh) {
    // 1. 从英文中提取所有号码
    const phones = [...eng.matchAll(/\b(\d{4,8}(?:[-/]\d{4,8})*)\b/g)].map(m => ({ num: m[0], idx: m.index }));
    if (phones.length === 0) return null;
    // 2. 按逗号切分英文
    const enParts = eng.split(/,\s*/).map(s => s.trim()).filter(Boolean);
    const items = [];
    enParts.forEach(p => {
        const pm = p.match(/\b(\d{4,8}(?:[-/]\d{4,8})*)\b/);
        if (pm) {
            const desc = p.slice(0, pm.index).replace(/[-–]\s*$/, '').trim();
            items.push({ desc: desc || p.replace(pm[0], '').replace(/[-–,\s]+$/, '').trim(), phone: pm[0] });
        }
    });
    if (items.length === 0) return null;
    // 3. 中文按"、"切分（去掉"："前的主标题）
    let zhRest = zh;
    const zColon = zh.indexOf("：");
    if (zColon >= 0) zhRest = zh.slice(zColon + 1);
    const zhItems = zhRest.split("、").map(s => s.trim()).filter(Boolean);
    // 4. 英文标题：取第一个 item desc 中"："之前的部分
    let enTitle = "";
    const firstDesc = items[0].desc;
    const tEnd = firstDesc.lastIndexOf(":");
    if (tEnd >= 0) enTitle = firstDesc.slice(0, tEnd + 1).trim();
    // 5. 中文标题：整个中文"："之前
    let zhTitle = "";
    if (zColon >= 0) zhTitle = zh.slice(0, zColon + 1);
    return { zhTitle, enTitle, items, zhItems };
}
function renderPhone(filterText) {
    const container = $("phoneContainer");
    if (!container) return;
    const entries = wordList.filter(w => w.group === "hot");
    const ft = filterText ? filterText.toLowerCase() : "";
    let html = "";
    entries.forEach(entry => {
        const parsed = parsePhoneRow(entry.eng, entry.cn);
        if (!parsed) return;
        const allText = (entry.eng + " " + entry.cn).toLowerCase();
        if (ft && !allText.includes(ft)) return;
        // 标题行
        let titleHtml = "";
        if (parsed.zhTitle || parsed.enTitle) {
            titleHtml = `<div class="phone-card-title">${escapeHTML(parsed.zhTitle)} <span class="en">${escapeHTML(parsed.enTitle)}</span></div>`;
        }
        // 逐行
        let rowsHtml = "";
        parsed.items.forEach((item, i) => {
            const zhLabel = parsed.zhItems[i] || "";
            rowsHtml += `
                <div class="phone-row">
                    <div class="phone-row-desc"><span class="zh">${escapeHTML(zhLabel)}</span><span class="sep">|</span><span class="en">${escapeHTML(item.desc)}</span></div>
                    <div class="phone-row-num">${escapeHTML(item.phone)}</div>
                </div>`;
        });
        html += `<div class="phone-card">${titleHtml}${rowsHtml}</div>`;
    });
    container.innerHTML = html || '<div class="phone-empty">🔍 没有匹配的电话记录</div>';
}

    { en: "September", abbr: "Sep", zh: "九月",  cat: "month" },
    { en: "October",   abbr: "Oct", zh: "十月",  cat: "month" },
    { en: "November",  abbr: "Nov", zh: "十一月", cat: "month" },
    { en: "December",  abbr: "Dec", zh: "十二月", cat: "month" },
    { en: "Monday",    zh: "星期一", cat: "weekday" },
    { en: "Tuesday",   zh: "星期二", cat: "weekday" },
    { en: "Wednesday", zh: "星期三", cat: "weekday" },
    { en: "Thursday",  zh: "星期四", cat: "weekday" },
    { en: "Friday",    zh: "星期五", cat: "weekday" },
    { en: "Saturday",  zh: "星期六", cat: "weekday" },
    { en: "Sunday",    zh: "星期日", cat: "weekday" }
];
let quizData = { correct: 0, wrong: 0, total: 0, current: null, options: [], answered: false, wrongCounts: {} };
let quizCategory = "all";
function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; } return arr; }
function quizSpeak(text) {
    if (!("speechSynthesis" in window)) return;
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "en-US";
    u.rate = 0.7;
    speechSynthesis.speak(u);
}
function showQuizAnalysis() {
    const overlay = $("quizAnalysisOverlay");
    const body = $("quizAnalysisBody");
    if (!overlay || !body) return;
    // 按错误次数排序，取前 10
    const entries = Object.entries(quizData.wrongCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 10);
    if (entries.length === 0) {
        body.innerHTML = `<div class="quiz-analysis-empty">🎉 全部答对，没有薄弱项！</div>`;
    } else {
        body.innerHTML = `<div style="font-size:13px;color:#888;margin-bottom:10px;text-align:center;">答 ${quizData.total} 题 · 共錯 ${quizData.wrong} 次</div>` +
        entries.map(([en, count]) => {
            const item = DATE_QUIZ.find(d => d.en === en);
            if (!item) return "";
            const label = item.abbr ? `${item.en} (${item.abbr})` : item.en;
            return `<div class="quiz-analysis-item">
                <div><span class="qai-eng">${label}</span><span class="qai-zh">${item.zh}</span></div>
                <span class="qai-count">錯 ${count} 次</span>
            </div>`;
        }).join("");
    }
    overlay.classList.add("show");
}
function resetQuizStats() {
    quizData.correct = 0; quizData.wrong = 0; quizData.total = 0;
    quizData.wrongCounts = {};
    $("quizScore").textContent = "✅ 0  ❌ 0";
    $("quizProgress").textContent = "0 / 0";
}
function loadQuiz() {
    const quizEng = $("quizEng"), quizOptions = $("quizOptions"), quizFeedback = $("quizFeedback");
    const quizNextBtn = $("quizNextBtn"), quizScore = $("quizScore"), quizProgress = $("quizProgress");
    if (!quizEng) return;
    // 按类别筛选题库
    const pool = quizCategory === "all" ? DATE_QUIZ : DATE_QUIZ.filter(d => d.cat === quizCategory);
    if (pool.length === 0) return;
    // 随机选当前题
    quizData.current = pool[Math.floor(Math.random() * pool.length)];
    // 生成 3 个干扰项（同类别）
    let distPool = pool.filter(d => d.en !== quizData.current.en);
    let distractors = shuffle(distPool).slice(0, 3);
    while (distractors.length < 3) {
        const fb = DATE_QUIZ.filter(d => !distractors.includes(d) && d.en !== quizData.current.en && d.cat === quizData.current.cat);
        if (fb.length === 0) break;
        distractors.push(fb[Math.floor(Math.random() * fb.length)]);
    }
    quizData.options = shuffle([quizData.current, ...distractors]);
    quizData.answered = false;
    // 随机选择显示全称或缩写（仅月份有缩写）
    const useAbbr = quizData.current.abbr && Math.random() < 0.5;
    quizData.questionText = useAbbr ? quizData.current.abbr : quizData.current.en;
    // 渲染
    quizEng.textContent = quizData.questionText;
    quizOptions.innerHTML = quizData.options.map((opt, i) =>
        `<div class="quiz-opt" data-idx="${i}" data-zh="${opt.zh}">${opt.zh}</div>`
    ).join("");
    quizFeedback.textContent = "";
    quizNextBtn.classList.add("hidden");
    // 绑定选项点击
    quizOptions.querySelectorAll(".quiz-opt").forEach(el => {
        el.addEventListener("click", () => {
            if (quizData.answered) return;
            quizData.answered = true;
            const chosen = el.dataset.zh;
            const isCorrect = chosen === quizData.current.zh;
            if (isCorrect) { quizData.correct++; el.classList.add("correct"); }
            else {
                quizData.wrong++; el.classList.add("wrong");
                // 记录错误
                const key = quizData.current.en;
                quizData.wrongCounts[key] = (quizData.wrongCounts[key] || 0) + 1;
            }
            quizOptions.querySelectorAll(".quiz-opt").forEach(oe => {
                oe.classList.add("disabled");
                if (oe.dataset.zh === quizData.current.zh) oe.classList.add("correct");
            });
            quizFeedback.textContent = isCorrect ? "✅ 正确！" : `❌ 错误！正确答案：${quizData.current.zh}`;
            quizFeedback.style.color = isCorrect ? "#4caf50" : "#f44336";
            quizScore.textContent = `✅ ${quizData.correct}  ❌ ${quizData.wrong}`;
            quizData.total++;
            quizProgress.textContent = `答 ${quizData.total} 题 · 正确率 ${Math.round(quizData.correct / quizData.total * 100)}%`;
            quizNextBtn.classList.remove("hidden");
            // 满 30 题弹分析
            if (quizData.total % 30 === 0) showQuizAnalysis();
        });
    });
}
// 朗读按钮
document.addEventListener("click", e => {
    if (e.target.id === "quizSpeakBtn" && quizData.current) {
        e.stopPropagation();
        quizSpeak(quizData.questionText || quizData.current.en);
    }
});
$("quizNextBtn").addEventListener("click", loadQuiz);
// 筛选筹码点击
document.querySelector(".quiz-filter").addEventListener("click", e => {
    const chip = e.target.closest(".chip");
    if (!chip) return;
    const qcat = chip.dataset.qcat;
    if (!qcat || qcat === quizCategory) return;
    quizCategory = qcat;
    document.querySelectorAll(".quiz-filter .chip").forEach(c => c.classList.toggle("active", c.dataset.qcat === qcat));
    resetQuizStats();
    loadQuiz();
});
// 分析面板按钮
document.addEventListener("click", e => {
    if (e.target.id === "qaaClose") {
        $("quizAnalysisOverlay").classList.remove("show");
    }
    if (e.target.id === "qaaReset") {
        $("quizAnalysisOverlay").classList.remove("show");
        resetQuizStats();
        loadQuiz();
    }
});

// ===================== 11. Tab 切換 =====================
const SECTIONS = {
    vocab:  { el: () => $("vocabSection"),  show: e => e.classList.remove("hidden"), hide: e => e.classList.add("hidden") },
    people: { el: () => $("peopleSection"), show: e => e.classList.add("active"),  hide: e => e.classList.remove("active") },
    phone:  { el: () => $("phoneSection"),  show: e => e.classList.add("active"),  hide: e => e.classList.remove("active") },
    quiz:   { el: () => $("quizSection"),   show: e => e.classList.add("active"),  hide: e => e.classList.remove("active") }
};
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const tabName = tab.dataset.tab;
        Object.keys(SECTIONS).forEach(key => {
            const s = SECTIONS[key], el = s.el();
            if (el) (key === tabName ? s.show : s.hide)(el);
        });
        if (tabName === "phone") renderPhone($("phoneSearch").value.trim());
        if (tabName === "quiz") loadQuiz();
    });
});

// ===================== 12. iOS / 後台兼容 =====================
// 首次进入尝试解锁 voices
function unlockVoices() {
    if (!("speechSynthesis" in window)) return;
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.lang = "en-US";
    speechSynthesis.speak(u);
}
// 页面切回前台时，iOS 可能已暂停合成
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        speechSynthesis.cancel();
    } else {
        unlockVoices();
    }
});

// ===================== 13. 初始化 =====================
loadState();
rebuildSelect();
// 应用持久化设置
rateRange.value = State.rate;
rateVal.textContent = State.rate.toFixed(2) + "x";
intervalRange.value = State.autoInterval;
intervalVal.textContent = State.autoInterval + "s";
favFilterChip.classList.toggle("active", State.favFilter);
updateAutoUI();
render();
renderPeople();
renderPhone();
loadQuiz();
unlockVoices();

// Service Worker
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
}
</script>
