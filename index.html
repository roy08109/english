    <link rel="manifest" href="manifest.json">

    <title>赌场运营英文对照学习器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        html, body {
            background: #1a1a2e;
            color: #fff;
        }
        body {
            padding: 16px 16px env(safe-area-inset-bottom) 16px;
            max-width: 900px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 16px;
        }
        .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #4fc3f7, #81d4fa, #ffd54f);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .tip {
            color: #888;
            font-size: 13px;
        }
        /* Tab 切換 */
        .tab-bar {
            display: flex;
            gap: 0;
            background: #24243b;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .tab-bar .tab {
            flex: 1;
            text-align: center;
            padding: 12px 0;
            font-size: 15px;
            color: #888;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
        }
        .tab-bar .tab.active {
            background: #0288d1;
            color: #fff;
            font-weight: 600;
        }
        /* 控制栏 */
        .control-bar {
            background: #24243b;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .row-label {
            color: #aaa;
            font-size: 13px;
            min-width: 56px;
        }
        .chip {
            padding: 7px 12px;
            border-radius: 16px;
            background: #2d2d44;
            color: #ccc;
            font-size: 13px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        .chip.active {
            background: #0288d1;
            color: #fff;
            border-color: #4fc3f7;
        }
        .chip:active {
            opacity: 0.7;
        }
        /* 滑块 */
        input[type=range] {
            flex: 1;
            min-width: 100px;
            accent-color: #4fc3f7;
        }
        .val {
            color: #ffd54f;
            font-size: 13px;
            min-width: 38px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* 开关 */
        .switch {
            position: relative;
            width: 42px;
            height: 24px;
            background: #2d2d44;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .switch::after {
            content: "";
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: 0.2s;
        }
        .switch.on {
            background: #388e3c;
        }
        .switch.on::after {
            left: 20px;
        }
        /* 卡片 */
        .card {
            background: #24243b;
            border-radius: 12px;
            padding: 22px;
            margin-bottom: 16px;
            position: relative;
        }
        .star-btn {
            position: absolute;
            top: 14px;
            right: 14px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: transparent;
            border: none;
            font-size: 22px;
            color: #555;
            cursor: pointer;
            transition: 0.2s;
        }
        .star-btn.on {
            color: #ffb300;
            text-shadow: 0 0 8px rgba(255,179,0,0.6);
        }
        .group-tag {
            display: inline-block;
            font-size: 11px;
            color: #4fc3f7;
            background: rgba(79,195,247,0.12);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
        }
        .eng-text, .cn-text {
            line-height: 1.8;
            margin-bottom: 18px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .eng-text {
            font-size: 19px;
            color: #81d4fa;
        }
        .cn-text {
            font-size: 17px;
            color: #ffd54f;
        }
        .token {
            display: inline;
            padding: 0 2px;
            border-radius: 3px;
            transition: background 0.15s, color 0.15s;
        }
        .token.active {
            background: #ffb300;
            color: #1a1a2e;
            box-shadow: 0 0 6px rgba(255,179,0,0.5);
        }
        /* 进度条 */
        .progress-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 0 4px;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: #2d2d44;
            border-radius: 3px;
            overflow: hidden;
            cursor: pointer;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4fc3f7, #0288d1);
            border-radius: 3px;
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 12px;
            color: #888;
            min-width: 70px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }
        /* 按钮 */
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            min-width: 100px;
            padding: 13px 8px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            color: #fff;
        }
        button:active {
            transform: scale(0.97);
            opacity: 0.85;
        }
        .read-btn { background: #0288d1; }
        .prev-btn { background: #388e3c; }
        .next-btn { background: #f57c00; }
        .auto-btn { background: #6a1b9a; }
        .auto-btn.on { background: #ff5252; }
        .page-num {
            text-align: center;
            margin-top: 12px;
            color: #888;
            font-size: 12px;
        }
        .voice-tip {
            color: #ff8888;
            text-align: center;
            margin: 6px 0 14px;
            font-size: 13px;
            min-height: 18px;
        }
        .countdown {
            color: #ffd54f;
            font-weight: 600;
        }
        /* 人員組織圖 */
        .people-section { display: none; }
        .people-section.active { display: block; }
        .phone-section { display: none; }
        .phone-section.active { display: block; }
        .vocab-section { display: block; }
        .vocab-section.hidden { display: none; }

        .org-team {
            background: #24243b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .org-team-title {
            font-size: 14px;
            font-weight: 600;
            color: #ffd54f;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a5c;
        }
        .org-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }
        .org-row.indent-1 { padding-left: 20px; }
        .org-row.indent-2 { padding-left: 40px; }
        .org-card {
            background: #1e1e32;
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 0;
            flex: 1 1 auto;
            border-left: 3px solid #4fc3f7;
        }
        .org-card.level-svp { border-left-color: #ff5252; }
        .org-card.level-vp  { border-left-color: #ffb300; }
        .org-card.level-avp { border-left-color: #ffb300; }
        .org-card.level-dir { border-left-color: #4fc3f7; }
        .org-card.level-ad  { border-left-color: #81c784; }
        .org-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid #3a3a5c;
        }
        .org-info { min-width: 0; }
        .org-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .org-title {
            font-size: 12px;
            color: #4fc3f7;
        }
        .org-title-cn {
            font-size: 11px;
            color: #aaa;
        }
        .org-speak {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 6px;
            color: #4fc3f7;
            transition: 0.15s;
            flex-shrink: 0;
            margin-left: auto;
            min-width: auto;
            flex: none;
            line-height: 1;
        }
        .org-speak:active {
            background: rgba(79,195,247,0.2);
            transform: scale(0.9);
        }
        /* 電話本 */
        .phone-card {
            background: #24243b;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 14px;
            border-left: 3px solid #4fc3f7;
        }
        .phone-card-title {
            font-size: 15px;
            font-weight: 700;
            color: #ffd54f;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #3a3a5c;
        }
        .phone-card-title .en {
            color: #81d4fa;
            font-weight: 600;
        }
        .phone-row {
            display: flex;
            flex-direction: column;
            margin-bottom: 14px;
            padding: 8px 10px;
            background: #1e1e32;
            border-radius: 8px;
        }
        .phone-row:last-child { margin-bottom: 0; }
        .phone-row-desc {
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 4px;
        }
        .phone-row-desc .zh {
            color: #ddd;
        }
        .phone-row-desc .sep {
            color: #4fc3f7;
            margin: 0 4px;
        }
        .phone-row-desc .en {
            color: #81d4fa;
        }
        .phone-row-num {
            font-size: 15px;
            font-weight: 600;
            color: #ffb300;
            padding-left: 0;
            font-variant-numeric: tabular-nums;
        }
        .phone-row-num::before {
            content: "📞 ";
            font-weight: 400;
        }
        .phone-empty {
            text-align: center;
            color: #888;
            font-size: 14px;
            padding: 40px 0;
        }
        .phone-search {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border-radius: 10px;
            border: none;
            background: #2d2d44;
            color: #fff;
            outline: none;
            margin-bottom: 16px;
        }
        .phone-search::placeholder { color: #666; }
        .phone-search:focus {
            background: #33335c;
            box-shadow: 0 0 0 2px #4fc3f7;
        }
    </style>
</head>

const wordList = RAW.map((r, i) => ({ id: i, group: r[0], eng: r[1], cn: r[2], favorite: false }));

// ===================== 2. 持久化：localStorage =====================
const STORAGE_KEY = "floor-op-state-v1";
const State = {
    favorites: new Set(),
    currentId: wordList[0].id,
    rate: 0.7,
    autoPlay: false,
    autoInterval: 3,
    favFilter: false
};
function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            favorites: [...State.favorites],
            currentId: State.currentId,
            rate: State.rate,
            autoPlay: State.autoPlay,
            autoInterval: State.autoInterval,
            favFilter: State.favFilter
        }));
    } catch(e) { /* 忽略 quota */ }
}
function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const s = JSON.parse(raw);
        if (Array.isArray(s.favorites)) State.favorites = new Set(s.favorites);
        if (typeof s.currentId === "number") State.currentId = s.currentId;
        if (typeof s.rate === "number") State.rate = s.rate;
        if (typeof s.autoPlay === "boolean") State.autoPlay = s.autoPlay;
        if (typeof s.autoInterval === "number") State.autoInterval = s.autoInterval;
        if (typeof s.favFilter === "boolean") State.favFilter = s.favFilter;
        wordList.forEach(w => { if (State.favorites.has(w.id)) w.favorite = true; });
    } catch(e) { /* 默認值即可 */ }
}

// ===================== 3. 視圖列表（支援僅收藏） =====================
function viewList() {
    return State.favFilter ? wordList.filter(w => w.favorite) : wordList;
}
function viewIndex() {
    const list = viewList();
    const idx = list.findIndex(w => w.id === State.currentId);
    return { list, idx };
}

// ===================== 5. 渲染 =====================
function escapeHTML(s) {
    return s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}
function tokenizeEn(text) {
    // 保留分隔符（空格、标点）以便 reassemble
    const parts = text.split(/(\s+|[,.;:!?()\[\]"'/&-])/);
    return parts.filter(p => p.length > 0);
}
function render() {
    const { list, idx } = viewIndex();
    if (list.length === 0) {
        engDom.textContent = "（没有收藏的句子）";
        cnDom.textContent = "请先添加收藏 ☆";
        pageInfoDom.textContent = "";
        starBtn.textContent = "☆"; starBtn.classList.remove("on");
        progressText.textContent = "0 / 0";
        progressFill.style.width = "0%";
        return;
    }
    const w = list[idx < 0 ? 0 : idx];
    if (idx < 0) State.currentId = w.id;
    // 英文：词组切分
    engDom.innerHTML = tokenizeEn(w.eng).map(t => {
        if (/^\s+$/.test(t) || /^[,.;:!?()\[\]"'/&\-]$/.test(t)) {
            return `<span>${escapeHTML(t)}</span>`;
        }
        return `<span class="token" data-tok>${escapeHTML(t)}</span>`;
    }).join("");
    cnDom.textContent = w.cn;
    pageInfoDom.textContent = `第 ${idx + 1} 句`;
    starBtn.textContent = w.favorite ? "★" : "☆";
    starBtn.classList.toggle("on", w.favorite);
    groupTag.textContent = GROUPS[w.group] || "";
    // 进度
    const total = list.length;
    progressText.textContent = `${idx + 1} / ${total}`;
    progressFill.style.width = `${((idx + 1) / total) * 100}%`;
    // 同步下拉
    jumpSelect.value = String(w.id);
    // 收藏计数
    favCount.textContent = `${State.favorites.size} 项`;
}

function rebuildSelect() {
    jumpSelect.innerHTML = "";
    const list = viewList();
    if (list.length === 0) {
        const opt = document.createElement("option");
        opt.textContent = "（无条目）"; opt.value = "-1";
        jumpSelect.appendChild(opt);
        return;
    }
    list.forEach((w, i) => {
        const opt = document.createElement("option");
        opt.value = String(w.id);
        const head = w.eng.length > 28 ? w.eng.slice(0, 28) + "…" : w.eng;
        opt.textContent = `${i + 1}. ${head}`;
        jumpSelect.appendChild(opt);
    });
}

// ===================== 6. 朗讀引擎（跟讀高亮） =====================
let currentUtter = null;
let autoPlayTimer = null;
let countdownTimer = null;

function cancelTimers() {
    if (autoPlayTimer) { clearTimeout(autoPlayTimer); autoPlayTimer = null; }
    if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }
}

function clearHighlight(scope) {
    scope.querySelectorAll(".token.active").forEach(el => el.classList.remove("active"));
}

function speak(text, lang, opts = {}) {
    return new Promise((resolve) => {
        if (!("speechSynthesis" in window)) {
            voiceTip.textContent = "❌ 当前浏览器不支持语音朗读";
            resolve("unsupported");
            return;
        }
        speechSynthesis.cancel();
        cancelTimers();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = lang;
        utter.rate = State.rate;
        utter.pitch = 1;
        currentUtter = utter;
        // 跟读高亮（仅英文）
        if (lang.startsWith("en") && opts.highlight) {
            const tokens = [...engDom.querySelectorAll(".token")];
            const full = tokenizeEn(text);
            // 预计算每个 token 的 charIndex 起止
            const ranges = [];
            let pos = 0;
            full.forEach(t => {
                if (/^\s+$/.test(t) || /^[,.;:!?()\[\]"'/&\-]$/.test(t)) {
                    pos += t.length;
                } else {
                    ranges.push({ start: pos, end: pos + t.length });
                    pos += t.length;
                }
            });
            utter.onboundary = (e) => {
                if (e.name && e.name !== "word") return;
                const ci = e.charIndex;
                clearHighlight(engDom);
                for (let i = 0; i < ranges.length; i++) {
                    if (ci >= ranges[i].start && ci < ranges[i].end) {
                        const el = tokens[i];
                        if (el) {
                            el.classList.add("active");
                            // 自动滚动到可视区
                            const rect = el.getBoundingClientRect();
                            if (rect.top < 80 || rect.bottom > window.innerHeight - 80) {
                                el.scrollIntoView({ behavior: "smooth", block: "center" });
                            }
                        }
                        break;
                    }
                }
            };
        }
        utter.onend = () => {
            clearHighlight(engDom);
            currentUtter = null;
            resolve("end");
        };
        utter.onerror = (err) => {
            // iOS 某些情况下 cancel 后会触发 error，无需提示
            if (err.error === "canceled" || err.error === "interrupted") {
                resolve("cancel");
            } else {
                voiceTip.textContent = "❌ 朗读失败：" + (err.error || "");
                resolve("error");
            }
        };
        speechSynthesis.speak(utter);
    });
}

async function playCurrent() {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    const w = list[idx < 0 ? 0 : idx];
    voiceTip.textContent = "🔊 朗读中…";
    const res = await speak(w.eng, "en-US", { highlight: true });
    if (res === "end") {
        voiceTip.textContent = State.autoPlay ? "" : "✅ 朗读完成";
        if (State.autoPlay) scheduleNext();
    } else if (res === "cancel") {
        voiceTip.textContent = "";
    }
}

function scheduleNext() {
    cancelTimers();
    let remaining = State.autoInterval;
    voiceTip.innerHTML = `⏭ <span class="countdown" id="cd">${remaining}</span> 秒后下一句…`;
    countdownTimer = setInterval(() => {
        remaining--;
        const el = document.getElementById("cd");
        if (el) el.textContent = remaining;
        if (remaining <= 0) {
            cancelTimers();
            goNext(true);
        }
    }, 1000);
    autoPlayTimer = setTimeout(() => {
        cancelTimers();
        goNext(true);
    }, State.autoInterval * 1000);
}

function stopAll() {
    speechSynthesis.cancel();
    cancelTimers();
    currentUtter = null;
    clearHighlight(engDom);
    voiceTip.textContent = "";
}

function goNext(auto = false) {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    if (idx < list.length - 1) {
        State.currentId = list[idx + 1].id;
    } else {
        // 末尾回到首句
        State.currentId = list[0].id;
        if (auto) voiceTip.textContent = "🔁 已循环到首句";
    }
    saveState();
    render();
    if (auto && State.autoPlay) playCurrent();
}
function goPrev() {
    const { list, idx } = viewIndex();
    if (list.length === 0) return;
    if (idx > 0) State.currentId = list[idx - 1].id;
    else State.currentId = list[list.length - 1].id;
    saveState();
    render();
}

// ===================== 7. 事件綁定 =====================
readBtn.addEventListener("click", () => {
    if (State.autoPlay && currentUtter) {
        // 自动播放中点朗读 = 停止
        State.autoPlay = false;
        updateAutoUI();
        stopAll();
        saveState();
    } else {
        playCurrent();
    }
});
prevBtn.addEventListener("click", () => { stopAll(); goPrev(); });
nextBtn.addEventListener("click", () => { stopAll(); goNext(false); });

jumpSelect.addEventListener("change", (e) => {
    const id = parseInt(e.target.value);
    if (!isNaN(id) && id >= 0) {
        State.currentId = id;
        stopAll();
        saveState();
        render();
    }
});

// 语速
rateRange.addEventListener("input", () => {
    State.rate = parseFloat(rateRange.value);
    rateVal.textContent = State.rate.toFixed(2) + "x";
    saveState();
});

// 自动播放开关
function updateAutoUI() {
    autoSwitch.classList.toggle("on", State.autoPlay);
    autoLabel.textContent = State.autoPlay ? "开启" : "关闭";
    readBtn.textContent = State.autoPlay && currentUtter ? "⏹ 停止" : "🔊 朗读";
}
autoSwitch.addEventListener("click", () => {
    State.autoPlay = !State.autoPlay;
    updateAutoUI();
    saveState();
    if (State.autoPlay) {
        playCurrent();
    } else {
        stopAll();
    }
});
intervalRange.addEventListener("input", () => {
    State.autoInterval = parseInt(intervalRange.value);
    intervalVal.textContent = State.autoInterval + "s";
    saveState();
});

// 收藏筛选
favFilterChip.addEventListener("click", () => {
    State.favFilter = !State.favFilter;
    favFilterChip.classList.toggle("active", State.favFilter);
    rebuildSelect();
    render();
    saveState();
});

// 收藏星标
starBtn.addEventListener("click", () => {
    const w = wordList.find(x => x.id === State.currentId);
    if (!w) return;
    w.favorite = !w.favorite;
    if (w.favorite) State.favorites.add(w.id);
    else State.favorites.delete(w.id);
    saveState();
    render();
});

// 进度条点击跳转
progressBar.addEventListener("click", (e) => {
    const rect = progressBar.getBoundingClientRect();
    const ratio = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
    const list = viewList();
    if (list.length === 0) return;
    const target = Math.floor(ratio * list.length);
    State.currentId = list[Math.min(target, list.length - 1)].id;
    stopAll();
    saveState();
    render();
});

// 键盘快捷键
document.addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
    if (e.key === "ArrowLeft") { stopAll(); goPrev(); }
    else if (e.key === "ArrowRight") { stopAll(); goNext(false); }
    else if (e.key === " " || e.key === "Enter") { e.preventDefault(); readBtn.click(); }
});

// 触摸滑动（左右滑切句）
let touchStartX = 0, touchStartY = 0;
document.addEventListener("touchstart", (e) => {
    if (e.touches.length !== 1) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener("touchend", (e) => {
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
        if (dx < 0) { stopAll(); goNext(false); }
        else { stopAll(); goPrev(); }
    }
}, { passive: true });

function renderPeople() {
    const container = $("orgContainer");
    if (!container) return;
    // 分组：按 indent 分组
    const html = PEOPLE.teams.map(team => {
        // 对每个团队，按 indent 分組
        const groups = {};
        team.nodes.forEach(n => {
            if (!groups[n.indent]) groups[n.indent] = [];
            groups[n.indent].push(n);
        });
        const levels = Object.keys(groups).sort((a,b) => a - b);
        let teamHtml = `<div class="org-team"><div class="org-team-title">${escapeHTML(team.name)}</div>`;
        levels.forEach(indent => {
            const rowClass = parseInt(indent) > 0 ? `org-row indent-${indent}` : "org-row";
            teamHtml += `<div class="${rowClass}">`;
            groups[indent].forEach(p => {
                const imgPath = `Picture/${p.img}`;
                const escapedName = escapeHTML(p.name);
                teamHtml += `
                    <div class="org-card level-${p.level}">
                        <img class="org-avatar" src="${imgPath}" alt="${escapedName}" loading="lazy" onerror="this.style.display='none'">
                        <div class="org-info">
                            <div class="org-name">${escapedName}</div>
                            <div class="org-title">${escapeHTML(p.title)}</div>
                            <div class="org-title-cn">${escapeHTML(p.titleCn)}</div>
                        </div>
                        <button class="org-speak" data-name="${escapedName}" title="朗读英文名">🔊</button>
                    </div>`;
            });
            teamHtml += `</div>`;
        });
        teamHtml += `</div>`;
        return teamHtml;
    }).join("");
    container.innerHTML = html;
    // 綁定人名朗讀（事件代理）
    container.addEventListener("click", (e) => {
        const btn = e.target.closest(".org-speak");
        if (!btn) return;
        const name = btn.dataset.name;
        if (name) {
            speechSynthesis.cancel();
            cancelTimers();
            currentUtter = null;
            const u = new SpeechSynthesisUtterance(name);
            u.lang = "en-US";
            u.rate = State.rate;
            u.pitch = 1;
            currentUtter = u;
            speechSynthesis.speak(u);
        }
    });
}

// ===================== 9. 電話本 =====================
function parsePhoneRow(eng, zh) {
    // 1. 从英文中提取所有号码
    const phones = [...eng.matchAll(/\b(\d{4,8}(?:[-/]\d{4,8})*)\b/g)].map(m => ({ num: m[0], idx: m.index }));
    if (phones.length === 0) return null;
    // 2. 按逗号切分英文
    const enParts = eng.split(/,\s*/).map(s => s.trim()).filter(Boolean);
    const items = [];
    enParts.forEach(p => {
        const pm = p.match(/\b(\d{4,8}(?:[-/]\d{4,8})*)\b/);
        if (pm) {
            const desc = p.slice(0, pm.index).replace(/[-–]\s*$/, '').trim();
            items.push({ desc: desc || p.replace(pm[0], '').replace(/[-–,\s]+$/, '').trim(), phone: pm[0] });
        }
    });
    if (items.length === 0) return null;
    // 3. 中文按"、"切分（去掉"："前的主标题）
    let zhRest = zh;
    const zColon = zh.indexOf("：");
    if (zColon >= 0) zhRest = zh.slice(zColon + 1);
    const zhItems = zhRest.split("、").map(s => s.trim()).filter(Boolean);
    // 4. 英文标题：取第一个 item desc 中"："之前的部分
    let enTitle = "";
    const firstDesc = items[0].desc;
    const tEnd = firstDesc.lastIndexOf(":");
    if (tEnd >= 0) enTitle = firstDesc.slice(0, tEnd + 1).trim();
    // 5. 中文标题：整个中文"："之前
    let zhTitle = "";
    if (zColon >= 0) zhTitle = zh.slice(0, zColon + 1);
    return { zhTitle, enTitle, items, zhItems };
}
function renderPhone(filterText) {
    const container = $("phoneContainer");
    if (!container) return;
    const entries = wordList.filter(w => w.group === "hot");
    const ft = filterText ? filterText.toLowerCase() : "";
    let html = "";
    entries.forEach(entry => {
        const parsed = parsePhoneRow(entry.eng, entry.cn);
        if (!parsed) return;
        const allText = (entry.eng + " " + entry.cn).toLowerCase();
        if (ft && !allText.includes(ft)) return;
        // 标题行
        let titleHtml = "";
        if (parsed.zhTitle || parsed.enTitle) {
            titleHtml = `<div class="phone-card-title">${escapeHTML(parsed.zhTitle)} <span class="en">${escapeHTML(parsed.enTitle)}</span></div>`;
        }
        // 逐行
        let rowsHtml = "";
        parsed.items.forEach((item, i) => {
            const zhLabel = parsed.zhItems[i] || "";
            rowsHtml += `
                <div class="phone-row">
                    <div class="phone-row-desc"><span class="zh">${escapeHTML(zhLabel)}</span><span class="sep">|</span><span class="en">${escapeHTML(item.desc)}</span></div>
                    <div class="phone-row-num">${escapeHTML(item.phone)}</div>
                </div>`;
        });
        html += `<div class="phone-card">${titleHtml}${rowsHtml}</div>`;
    });
    container.innerHTML = html || '<div class="phone-empty">🔍 没有匹配的电话记录</div>';
}
document.addEventListener("input", e => { if (e.target.id === "phoneSearch") renderPhone(e.target.value.trim()); });

// ===================== 10. Tab 切換 =====================
const SECTIONS = {
    vocab:  { el: () => $("vocabSection"),  show: e => e.classList.remove("hidden"), hide: e => e.classList.add("hidden") },
    people: { el: () => $("peopleSection"), show: e => e.classList.add("active"),  hide: e => e.classList.remove("active") },
    phone:  { el: () => $("phoneSection"),  show: e => e.classList.add("active"),  hide: e => e.classList.remove("active") }
};
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        const tabName = tab.dataset.tab;
        Object.keys(SECTIONS).forEach(key => {
            const s = SECTIONS[key], el = s.el();
            if (el) (key === tabName ? s.show : s.hide)(el);
        });
        if (tabName === "phone") renderPhone($("phoneSearch").value.trim());
    });
});

// 首次进入尝试解锁 voices
function unlockVoices() {
    if (!("speechSynthesis" in window)) return;
    const u = new SpeechSynthesisUtterance(" ");
    u.volume = 0;
    u.lang = "en-US";
    speechSynthesis.speak(u);
}
// 页面切回前台时，iOS 可能已暂停合成
document.addEventListener("visibilitychange", () => {
    if (document.hidden) {
        speechSynthesis.cancel();
    } else {
        unlockVoices();
    }
});
